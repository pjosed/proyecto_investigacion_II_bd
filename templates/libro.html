<!DOCTYPE html>
<html>
<head>
    <title>Libros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="container">
    <h2>LIBROS</h2>

    <!-- Formulario Insertar -->
    <form action="/libro/insertar" method="post">
        <input type="text" name="titulo" placeholder="Título">
        <button type="submit">Insertar</button>
    </form>

    <!-- Formulario Actualizar -->
    <form action="/libro/actualizar" method="post">
        <input type="text" name="titulo" placeholder="Título actual">
        <input type="text" name="nuevo" placeholder="Nuevo título">
        <button type="submit">Actualizar</button>
    </form>

    <!-- Formulario Borrar -->
    <form action="/libro/borrar" method="post">
        <input type="text" name="titulo" placeholder="Título">
        <button type="submit">Borrar</button>
    </form>

    <!-- Lista de libros -->
    <h3>Lista de libros:</h3>
    <ul>
        {% for libro in libros %}
            <li>{{ libro.titulo }}</li>
        {% endfor %}
    </ul>

    <!-- Botón Volver -->
    <a class="btn back-btn" href="/crud">Volver</a>
</div>

</body>
</html>
